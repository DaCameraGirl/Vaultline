<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Vaultline — AI training media governance">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f131a"/>
      <stop offset="45%" stop-color="#07090d"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#5eead4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="92%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#3d8bfd" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3d8bfd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowDeep" cx="8%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#3d8bfd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3d8bfd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="45%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
    <linearGradient id="vaultDoor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2430"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#1c2430" stroke-width="1" opacity="0.55"/>
    </pattern>
    <clipPath id="round">
      <rect width="1200" height="280" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="280" fill="url(#sky)"/>
    <rect width="1200" height="280" fill="url(#glowTeal)"/>
    <rect width="1200" height="280" fill="url(#glowBlue)"/>
    <rect width="1200" height="280" fill="url(#glowDeep)"/>
    <rect width="1200" height="280" fill="url(#grid)" opacity="0.55"/>

    <ellipse cx="600" cy="300" rx="520" ry="120" fill="#5eead4" opacity="0.04"/>
    <ellipse cx="980" cy="40" rx="180" ry="80" fill="#3d8bfd" opacity="0.06"/>

    <!-- vault shield motif -->
    <g transform="translate(1020 72)">
      <rect x="-36" y="-28" width="72" height="56" rx="10" fill="url(#vaultDoor)" stroke="#1c2430" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#3d8bfd" stroke-width="2" opacity="0.85"/>
      <circle cx="0" cy="0" r="8" fill="#5eead4" opacity="0.35"/>
      <path d="M-10 0 L-3 7 L10 -8" fill="none" stroke="#5eead4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-28" y1="-18" x2="28" y2="-18" stroke="#243044" stroke-width="1"/>
      <line x1="-28" y1="18" x2="28" y2="18" stroke="#243044" stroke-width="1"/>
    </g>

    <!-- lineage nodes -->
    <g fill="#e8edf5" opacity="0.75">
      <circle cx="148" cy="58" r="2"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="210" cy="92" r="1.5" opacity="0.6"/>
      <circle cx="92" cy="118" r="1.8" opacity="0.55"/>
      <circle cx="168" cy="168" r="2.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="118" cy="210" r="1.4" opacity="0.65"/>
    </g>
    <g stroke="#5eead4" stroke-width="1" opacity="0.35">
      <line x1="148" y1="58" x2="210" y2="92"/>
      <line x1="210" y1="92" x2="168" y2="168"/>
      <line x1="92" y1="118" x2="168" y2="168"/>
    </g>

    <text x="600" y="112" text-anchor="middle" font-family="Segoe UI, Instrument Sans, Inter, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5" fill="url(#titleGrad)">
      <tspan fill="#e8edf5">Vault</tspan><tspan fill="#5eead4">line</tspan>
    </text>
    <text x="600" y="152" text-anchor="middle" font-family="Segoe UI, Instrument Sans, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#8b97a8">AI training media governance — provenance, QC, compliance, immutable releases</text>

    <rect x="250" y="176" width="700" height="2" rx="1" fill="#1c2430"/>
    <rect x="350" y="176" width="500" height="2" rx="1" fill="#5eead4" opacity="0.7">
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="4s" repeatCount="indefinite"/>
    </rect>

    <g font-family="Segoe UI, Instrument Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="#8b97a8">
      <text x="600" y="212" text-anchor="middle">FastAPI · SQLite catalog · audit export · Docker · Render</text>
      <text x="600" y="238" text-anchor="middle" fill="#5eead4" opacity="0.9">Prove what went into the model — every clip traced, QC-gated, release-ready</text>
    </g>

    <circle cx="1088" cy="208" r="2.5" fill="#3d8bfd" opacity="0.7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="58" r="2" fill="#5eead4" opacity="0.6"/>
    <circle cx="148" cy="220" r="2" fill="#fbbf24" opacity="0.55"/>
  </g>
</svg>