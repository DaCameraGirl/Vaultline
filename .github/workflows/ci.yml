name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall api workbench bench.py scripts
      - name: Verify FastAPI app imports
        run: python -c "from api.server import app; assert app is not None"